x-install-app: &install-app
  image: irep-install-app:local
  working_dir: /var/www/html
  env_file:
    - ./src/.env.install
  depends_on:
    irep_install_db:
      condition: service_healthy
  volumes:
    - irep_install_private_storage:/var/www/html/storage/app/private
    - irep_install_public_storage:/var/www/html/storage/app/public
    - irep_install_logs:/var/www/html/storage/logs

services:
  irep_install_db:
    image: postgres:14.12
    restart: unless-stopped
    environment:
      POSTGRES_DB: irep_install
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${IREP_INSTALL_DB_PASSWORD:-irep_local_password}
    ports:
      - '5434:5432'
    volumes:
      - irep_install_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d irep_install']
      interval: 5s
      timeout: 5s
      retries: 20

  irep_install_php:
    <<: *install-app
    build:
      context: .
      dockerfile: php-install.dockerfile
    restart: unless-stopped

  irep_install_cli:
    <<: *install-app
    entrypoint: ['/bin/sh', '-lc']

  irep_install_nginx:
    image: irep-install-nginx:local
    build:
      context: .
      dockerfile: nginx-install.dockerfile
    restart: unless-stopped
    depends_on:
      - irep_install_php
    ports:
      - '8088:80'
    volumes:
      - irep_install_public_storage:/var/www/html/storage/app/public:ro

  irep_install_reverb:
    <<: *install-app
    restart: unless-stopped
    depends_on:
      irep_install_db:
        condition: service_healthy
      irep_install_php:
        condition: service_started
    entrypoint: ['php', 'artisan', 'reverb:start', '--host', '0.0.0.0', '--port', '8080']
    ports:
      - '8081:8080'

  irep_install_supervisord:
    <<: *install-app
    restart: unless-stopped
    depends_on:
      irep_install_db:
        condition: service_healthy
      irep_install_php:
        condition: service_started
      irep_install_reverb:
        condition: service_started
    command: ['supervisord', '-c', '/etc/supervisord.conf']

volumes:
  irep_install_db_data:
  irep_install_private_storage:
  irep_install_public_storage:
  irep_install_logs: