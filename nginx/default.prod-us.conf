server {
    listen 80 default_server;

    server_name _;

    return 301 https://$host$request_uri;
    resolver 127.0.0.11;
    
}

server {
    listen 443 ssl;

    index index.php index.html;
    server_name viznovo.com;
    root /var/www/html/public;
    resolver 127.0.0.11;
    
    client_max_body_size 200m;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    send_timeout 1200s;
    fastcgi_read_timeout 1200s;
    fastcgi_send_timeout 1200s;
    keepalive_timeout 1200s;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    error_page 404 /index.php;

     location ~ /app/(?<reverbkey>.*) { # variable reverbkey
  proxy_pass http://irep_reverb:8080/app/$reverbkey;
  proxy_http_version 1.1;
  proxy_set_header Host $http_host;
  proxy_set_header Scheme $scheme;
  proxy_set_header SERVER_PORT $server_port;
  proxy_set_header REMOTE_ADDR $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "Upgrade";
  proxy_read_timeout 120;
  proxy_send_timeout 120;
}

# The Laravel Backend would broadcast to this
location ~ ^/apps/(?<reverbid>[^/]+)/events$ { # variable reverbid
  proxy_pass http://irep_reverb:8080/apps/$reverbid/events;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_read_timeout 120;
  proxy_send_timeout 120;
}

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass irep_php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    ssl_certificate /etc/letsencrypt/live/viznovo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/viznovo.com/privkey.pem;
}
